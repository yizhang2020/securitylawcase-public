site_name: SecurityLawCase
site_url: https://www.securitylawcase.com

# Displayed in the footer area (used by overrides/partials/source-file.html)
copyright: "© 2026 Yi Zhang. Licensed under the MIT License."

extra:
  site_tagline: "For security professionals — speak to the board, counsel, and regulator."
  # Home link for logo / brand (avoids empty href when nav.homepage is unset in some builds)
  homepage: .
repo_url: https://github.com/<your-username>/securitylawcase-public
repo_name: securitylawcase-public
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides

  # Fonts
  font:
    text: Inter
    code: JetBrains Mono

  features:
    # Horizontal top navigation
    - navigation.tabs
    - navigation.tabs.sticky

    # Keep secondary navigation usable but not "docs-y"
    - navigation.sections
    - navigation.expand

    # UX
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

  palette:
    # Default: Indigo header (good contrast with light brand text)
    - scheme: default 
      primary: indigo 
      accent: cyan 
      toggle:  
        icon: material/weather-sunny
        name: Switch to light mode 

    # Dark: Blue
    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

plugins:
  - search
  - git-revision-date-localized:
      type: custom
      # e.g. 2026 March 20 8:00 AM (Los Angeles)
      custom_format: "%Y %B %-d %-I:%M %p"
      timezone: America/Los_Angeles
      locale: en
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  # Keep top bar minimal (platform feel)
  - Home: index.md

  - Browse:
      - All Cases: browse/index.md
      - Regimes: taxonomy/regimes.md
      - Legal Issues: taxonomy/legal-issues.md

  - Writing Studio:
      - Overview: studio/index.md
      - Workflows: studio/workflows.md
      - Document Types: studio/document-types.md
      - Writing Best Practices: studio/writing-best-practices.md

  - Methodology: methodology.md
